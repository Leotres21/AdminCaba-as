    <script>
(function() {
// ==========================================
// 1. UTILIDADES
// ==========================================
let currentCalDate = new Date(); // Estado global del visor de calendario
const formatCOP = (value) => {
    const numberValue = Number(value);
    if (isNaN(numberValue)) return '$0';
    return new Intl.NumberFormat('es-CO', {
        style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0
    }).format(numberValue);
};

const formatDate = (dateString) => {
    if (!dateString) return '';
    const date = new Date(dateString.replace(/-/g, '/'));
    return date.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
};

const calcSaldo = (total, anticipo) => {
    return (Number(total) || 0) - (Number(anticipo) || 0);
};
// Función de Exportación Profesional a Excel (CSV con BOM UTF-8)
const downloadCSV = (data, filename, headers) => {
    // 1. Mapear datos a nombres de columnas amigables
    const csvRows = [];
    const keys = Object.keys(headers);
    csvRows.push(keys.map(k => headers[k]).join(',')); // Header row

    for (const row of data) {
        const values = keys.map(key => {
            const val = row[key] === null || row[key] === undefined ? "" : row[key];
            const escaped = ('' + val).replace(/"/g, '""'); // Escapar comillas dobles
            return `"${escaped}"`;
        });
        csvRows.push(values.join(','));
    }

    const csvContent = "\uFEFF" + csvRows.join("\n"); // Añadir BOM para que Excel detecte acentos
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

// ==========================================
// 2. CLIENTE SUPABASE
// ==========================================
const SUPABASE_URL = 'https://wlhkksvxbkolquhrdqlk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsaGtrc3Z4YmtvbHF1aHJkcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzY2NjUsImV4cCI6MjA5MTExMjY2NX0.eQAom69NifoFNaaXpFT1fvNqCDq24xTdulukhA9umMs';

const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
if (!supabase) showToast("Supabase JS no cargó correctamente desde internet.", "error");

// ==========================================
// 3. SERVICIOS (Llamadas a Base de Datos)
// ==========================================
const getReservas = async () => {
    try {
        const { data, error } = await supabase.from('reservas').select('*').order('fecha_entrada', { ascending: true });
        if (error) throw error;
        return data;
    } catch (error) { console.error(error); return []; }
};

const createReserva = async (reservaData) => {
    try {
        const { data, error } = await supabase.from('reservas').insert([reservaData]).select();
        if (error) throw error;
        return data[0];
    } catch (error) { console.error(error); throw error; }
};

const getFinanzasTotales = async () => {
    try {
        const { data, error } = await supabase.from('finanzas').select('*');
        if (error) throw error;
        let ingresos = 0; let gastos = 0;
        data.forEach(item => {
            if(item.tipo === 'ingreso') ingresos += Number(item.valor);
            if(item.tipo === 'gasto') gastos += Number(item.valor);
        });
        return { ingresos, gastos, utilidad: ingresos - gastos, raw: data };
    } catch (error) { console.error(error); return { ingresos: 0, gastos: 0, utilidad: 0, raw: [] }; }
};

const getTransacciones = async (tipo) => {
    try {
        // Query base
        let query = supabase.from('finanzas').select('*').order('fecha', { ascending: false });
        if(tipo) {
            query = query.eq('tipo', tipo);
        }
        const { data, error } = await query;
        if (error) throw error;
        return data;
    } catch (error) { console.error(error); return []; }
};

const createTransaccion = async (transaccionData) => {
    try {
        const { data, error } = await supabase.from('finanzas').insert([transaccionData]).select();
        if (error) throw error;
        return data[0];
    } catch (error) { console.error(error); throw error; }
};

// ==========================================
// 4. VISTAS (Views)
// ==========================================

                <div class="card"><div style="color: var(--text-secondary); font-size: 0.875rem;">Ingresos Registrados</div><div id="dash-kpi-ingresos" style="font-size: 1.75rem; font-weight: 700; margin-top: 8px; color: var(--primary)">...</div></div>
                <div class="card"><div style="color: var(--text-secondary); font-size: 0.875rem;">Gastos Mantenimiento</div><div id="dash-kpi-gastos" style="font-size: 1.75rem; font-weight: 700; margin-top: 8px; color: var(--danger)">...</div></div>
                <div class="card"><div style="color: var(--text-secondary); font-size: 0.875rem;">Utilidad Neta</div><div id="dash-kpi-utilidad" style="font-size: 1.75rem; font-weight: 700; margin-top: 8px; color: var(--warning)">...</div></div>
            </div>
            <div class="grid-cols-3" style="grid-template-columns: 2fr 1fr;">
                <div class="card" style="height: 400px; display:flex; flex-direction:column;">
                    <h3 style="margin-bottom: 24px;">Balance Financiero</h3>
                    <div style="flex:1; position:relative;"><canvas id="revenueChart"></canvas></div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 24px;">Tip de Crecimiento</h3>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;">
                        <img src="https://images.unsplash.com/photo-1550096141-726e6f98c8c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:16px;">
                        Para mantener sana tu relación de gastos vs ingresos, intenta que los costos operativos de la Cabaña (Aseo y Servicios) no superen el 20% del total de tus ingresos en la temporada alta. 
                    </div>
                </div>
            </div>
        </div>
    `;
}

function ReservasView() {
    setTimeout(function() {
        const tabs = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                const target = tab.getAttribute('data-target');
                tabs.forEach(function(t) { t.classList.remove('active'); });
                contents.forEach(function(c) { c.classList.remove('active-content'); });
                tab.classList.add('active');
                document.getElementById(target).classList.add('active-content');
            });
        });

        // Configuración de Múltiples Vistas (Senior CRM Pattern)
        let currentViewMode = 'list'; // Por defecto formato Lista

        const btnList = document.getElementById('toggle-list-res');
        const btnCard = document.getElementById('toggle-card-res');
        
        if(btnList) btnList.addEventListener('click', () => { currentViewMode = 'list'; updateToggles(); loadReservas(); });
        if(btnCard) btnCard.addEventListener('click', () => { currentViewMode = 'card'; updateToggles(); loadReservas(); });

        function updateToggles() {
            if(btnList) btnList.className = currentViewMode === 'list' ? 'icon-btn active-view' : 'icon-btn';
            if(btnCard) btnCard.className = currentViewMode === 'card' ? 'icon-btn active-view' : 'icon-btn';
        }

        async function loadReservas() {
            const container = document.getElementById('reservas-view-container');
            if(!container) return;
            container.innerHTML = '<div style="text-align:center; padding: 24px; color: var(--text-secondary);">Cargando reservas...</div>';
            try {
                const reservas = await getReservas();
                
                // Limpiar search al recargar si se desea, o volver a filtrar (lo haremos más dinámico)
                
                if(reservas.length === 0) {
                    container.innerHTML = `<div class='empty-state'>
                        <i class='ph ph-calendar-blank'></i>
                        <h3>Sin reservas registradas</h3>
                        <p>Aún no hay clientes agendados. ¡Regístralos usando el botón Nueva Reserva!</p>
                    </div>`;
                    return;
                }
                
                let htmlStr = '';
                
                if(currentViewMode === 'list') {
                    htmlStr += `<div class='table-responsive-container'>
                        <div class='dense-list-header'>
                            <div>Huésped</div>
                            <div>Fechas</div>
                            <div>Personas</div>
                            <div style='text-align:center;'>Estado</div>
                            <div style='text-align:right;'>Total</div>
                            <div style='text-align:right;'>Saldo</div>
                            <div style='text-align:center;'>Acción</div>
                        </div>
                        <div class='dense-list-body'>`;
                } else {
                    htmlStr += "<div class='modern-list-container'>";
                }

                reservas.forEach(function(res) {
                    const saldo = calcSaldo(res.precio_total, res.anticipo);
                    const bc = res.estado === 'confirmado' ? 'success' : res.estado === 'pendiente' ? 'warning' : 'danger';
                    const telHtml = res.telefono_cliente ? `<div class='dense-subtext'><i class='ph ph-phone'></i> ${res.telefono_cliente}</div>` : "";
                    const saldoColor = saldo > 0 ? "color:var(--danger);" : "color:var(--success);";
                    const searchDataStr = (res.nombre_cliente + " " + res.estado).toLowerCase();
                    
                    if(currentViewMode === 'list') {
                        htmlStr += `<div class='dense-row reserva-item-render' data-search='${searchDataStr}'>
                            <div class='d-col-info'>
                                <span class='dense-user-name'>${res.nombre_cliente}</span>
                                ${telHtml}
                            </div>
                            <div class='d-col-fechas'>
                                <div><span class='text-muted'>In:</span> ${formatDate(res.fecha_entrada)}</div>
                                <div><span class='text-muted'>Out:</span> ${formatDate(res.fecha_salida)}</div>
                            </div>
                            <div class='d-col-personas'><i class='ph ph-users'></i> ${res.numero_personas}</div>
                            <div class='d-col-badge' style='text-align:center;'><span class='dense-badge ${bc}'>${res.estado}</span></div>
                            <div class='d-col-total' style='text-align:right; font-weight:600;'>${formatCOP(res.precio_total)}</div>
                            <div class='d-col-saldos' style='text-align:right; font-weight:700; ${saldoColor}'>${formatCOP(saldo)}</div>
                            <div class='d-col-acciones' style='text-align:center;'><button class='icon-btn' style='background:var(--bg-main)'><i class='ph ph-caret-right'></i></button></div>
                        </div>`;
                    } else {
                        htmlStr += "<div class='crm-card reserva-item-render' data-search='" + searchDataStr + "'>" +
                            "<div class='crm-card-header'>" +
                                "<div>" +
                                    "<div class='crm-card-title'>" + res.nombre_cliente + "</div>" +
                                    (res.telefono_cliente ? "<div class='crm-card-subtitle'><i class='ph ph-phone'></i> " + res.telefono_cliente + "</div>" : "") +
                                "</div>" +
                                "<span class='badge " + bc + "'>" + res.estado + "</span>" +
                            "</div>" +
                            "<div class='crm-card-body'>" +
                                "<div class='crm-detail-item'>" +
                                    "<div class='crm-detail-label'>Entrada</div>" +
                                    "<div class='crm-detail-value'>" + formatDate(res.fecha_entrada) + "</div>" +
                                "</div>" +
                                "<div class='crm-detail-item'>" +
                                    "<div class='crm-detail-label'>Salida</div>" +
                                    "<div class='crm-detail-value'>" + formatDate(res.fecha_salida) + "</div>" +
                                "</div>" +
                                "<div class='crm-detail-item'>" +
                                    "<div class='crm-detail-label'>Personas</div>" +
                                    "<div class='crm-detail-value'>" + res.numero_personas + " pax</div>" +
                                "</div>" +
                            "</div>" +
                            "<div class='crm-card-footer'>" +
                                "<div class='crm-financials'>" +
                                    "<div class='crm-detail-item'>" +
                                        "<div class='crm-detail-label'>Total</div>" +
                                        "<div class='crm-detail-value'>" + formatCOP(res.precio_total) + "</div>" +
                                    "</div>" +
                                    "<div class='crm-detail-item'>" +
                                        "<div class='crm-detail-label'>Saldo</div>" +
                                        "<div class='crm-detail-value' style='" + saldoColor + "'>" + formatCOP(saldo) + "</div>" +
                                    "</div>" +
                                "</div>" +
                                "<button class='icon-btn' aria-label='Ver Detalles'><i class='ph ph-eye'></i></button>" +
                            "</div>" +
                        "</div>";
                    }
                });
                
                if(currentViewMode === 'list') {
                    htmlStr += "</div></div>"; // Cerrar .dense-list-body y .table-responsive-container
                } else {
                    htmlStr += "</div>"; // Cerrar modern-list-container
                }
                // Inject for dynamic empty search states
                htmlStr += `<div id="res-search-empty" class="empty-state" style="display:none;">
                    <i class="ph ph-magnifying-glass"></i>
                    <h3>No se encontraron resultados</h3>
                    <p>Intenta con otro término de búsqueda.</p>
                </div>`;
                
                container.innerHTML = htmlStr;
                
                // Re-ejecutar Filtro si el input ya tenía texto
                const srcInput = document.getElementById('search-reservas');
                if(srcInput && srcInput.value.trim().length > 0) resSearchExecute(srcInput.value.trim());

            } catch (error) { 
                container.innerHTML = '<div style="text-align:center; padding: 24px; color:red">Error al cargar listado: ' + error.message + '</div>'; 
            }
        }
        function resSearchExecute(val) {
            const items = document.querySelectorAll('.reserva-item-render');
            let found = 0;
            const term = val.toLowerCase();
            items.forEach(el => {
                if (el.getAttribute('data-search').includes(term)) { el.style.display = currentViewMode === 'list' ? 'flex' : 'block'; found++; }
                else { el.style.display = 'none'; }
            });
            const emSt = document.getElementById('res-search-empty');
            if(emSt) emSt.style.display = found === 0 ? 'flex' : 'none';
        }

        const btnExportRes = document.getElementById('export-reservas-res');
        if(btnExportRes) {
            btnExportRes.addEventListener('click', async () => {
                const reservas = await getReservas();
                const headers = { 
                    nombre_cliente: "Huésped", 
                    telefono_cliente: "Celular", 
                    fecha_entrada: "Entrada", 
                    fecha_salida: "Salida", 
                    numero_personas: "Personas", 
                    estado: "Estado", 
                    precio_total: "Precio Total", 
                    anticipo: "Anticipo", 
                    origen_reserva: "Media/Origen"
                };
                downloadCSV(reservas, `Reporte_Reservas_${new Date().toISOString().split('T')[0]}.csv`, headers);
            });
        }

        loadReservas();

        const formNueva = document.getElementById('form-nueva-reserva');
        if(formNueva) {
            formNueva.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(formNueva);
                const data = {
                    nombre_cliente: formData.get('nombre'),
                    telefono_cliente: formData.get('telefono'),
                    fecha_entrada: formData.get('fecha_in'),
                    fecha_salida: formData.get('fecha_out'),
                    numero_personas: parseInt(formData.get('personas')),
                    origen_reserva: formData.get('origen'),
                    estado: 'pendiente',
                    precio_total: parseFloat(formData.get('precio')),
                    anticipo: parseFloat(formData.get('anticipo')) || 0,
                    observaciones: formData.get('observaciones')
                };
                
                const btnSubmit = formNueva.querySelector('button[type="submit"]');
                const originalText = btnSubmit.innerHTML; 
                btnSubmit.innerHTML = 'Guardando...'; btnSubmit.disabled = true;

                try {
                    await createReserva(data);
                    showToast("Reserva creada con éxito en Supabase!", "success");
                    formNueva.reset();
                    document.querySelector(".tab-btn[data-target='tab-lista']").click();

function CalendarioView() {
    setTimeout(function() {
        const calendarGrid = document.getElementById('calendar-days-grid');
        const monthLabel = document.getElementById('calendar-month-label');
        if(!calendarGrid || !monthLabel) return;

        async function renderCalendar() {
            calendarGrid.innerHTML = ''; // Limpiar cuadrícula
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            
            // Nombre del mes en español
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            monthLabel.textContent = monthNames[month] + " " + year;

            // Días del mes anterior para el espaciado
            const firstDayOfMonth = new Date(year, month, 1).getDay(); // 0 (Dom) - 6 (Sab)
            // Ajustar a Lunes inicio (1:Lun, ..., 0:Dom -> 6)
            const adjustedOffset = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // 1. Agregar espacios vacíos
            for (let i = 0; i < adjustedOffset; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarGrid.appendChild(emptyDay);
            }

            // 2. Fetch Reservas para este mes
            let reservas = [];
            try {
                reservas = await getReservas();
            } catch(e) { console.error("Error cargando reservas para calendario:", e); }

            // 3. Generar días con lógica de ocupación
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.textContent = day;

                const currentDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const todayStr = new Date().toISOString().split('T')[0];
                if(currentDateStr === todayStr) dayEl.classList.add('today');

                // Lógica de Ocupación: Verificar si el día actual está dentro de alguna reserva
                const reservaEncontrada = reservas.find(res => {
                    const inDate = new Date(res.fecha_entrada).toISOString().split('T')[0];
                    const outDate = new Date(res.fecha_salida).toISOString().split('T')[0];
                    return currentDateStr >= inDate && currentDateStr <= outDate;
                });

                if (reservaEncontrada) {
                    dayEl.classList.add('occupied');
                    dayEl.innerHTML = `<span>${day}</span><div class='guest-initial' title='${reservaEncontrada.nombre_cliente}'>${reservaEncontrada.nombre_cliente.substring(0, 10)}</div><div class='occ-indicator'></div>`;
                }

                calendarGrid.appendChild(dayEl);
            }
        }

        // Navegación
        document.getElementById('prev-month').addEventListener('click', () => {
            currentCalDate.setMonth(currentCalDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('next-month').addEventListener('click', () => {
            currentCalDate.setMonth(currentCalDate.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    }, 50);

    return `
        <div class="calendar-container">
            <div class="calendar-nav">
                <button id="prev-month" class="icon-btn" style="background:#F3F4F6"><i class="ph ph-caret-left"></i></button>
                <div id="calendar-month-label" class="calendar-month-year">...</div>
                <button id="next-month" class="icon-btn" style="background:#F3F4F6"><i class="ph ph-caret-right"></i></button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-day-label">Lun</div>
                <div class="calendar-day-label">Mar</div>
                <div class="calendar-day-label">Mié</div>
                <div class="calendar-day-label">Jue</div>
                <div class="calendar-day-label">Vie</div>
                <div class="calendar-day-label">Sáb</div>
                <div class="calendar-day-label">Dom</div>
            </div>
            <div id="calendar-days-grid" class="calendar-grid">
                <!-- Días inyectados por JS -->
            </div>
        </div>
    `;
}

const contentEl = document.getElementById('app-content');
const titleEl = document.getElementById('page-title');
const navItems = document.querySelectorAll('.nav-item');

function navigateTo(path) {
    if (!routes[path]) path = '/dashboard';
    const route = routes[path];
    if(titleEl) { titleEl.textContent = route.title; }
    
    if(navItems) {
        navItems.forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-path') === path) item.classList.add('active');
        });
    }
    
    if(contentEl) {
        contentEl.innerHTML = typeof route.view === 'function' ? route.view() : '';
    }
}

    else navigateTo(window.location.hash.replace('#', ''));

    // Navegación Móvil
    const menuBtn = document.getElementById('mobile-menu-btn');
    const sidebar = document.getElementById('main-sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    }

    if(menuBtn) menuBtn.addEventListener('click', toggleMenu);
    if(overlay) overlay.addEventListener('click', toggleMenu);
    
    // Cerrar menú al tocar un item de la sidebar en móvil
    const navItemsList = document.querySelectorAll('.nav-item');
    navItemsList.forEach(item => {
        item.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        });
    });
    // Registro de Service Worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ PWA: Service Worker Activado', reg))
                .catch(err => console.log('❌ PWA: Error al activar Service Worker', err));
        });
    }
});

// Funciones Globales Adicionales de Utilidad y UX

// 1. Toast Notification System
window.showToast = function(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if(!container) return;
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    let icon = 'ph-check-circle';
    if(type === 'error') icon = 'ph-x-circle';
    if(type === 'warning') icon = 'ph-warning';
    
    toast.innerHTML = `<i class='ph ${icon}' style='font-size:1.5rem;'></i> <span>${message}</span>`;
    
    container.appendChild(toast);
    
    // Animación de entrada
    setTimeout(() => toast.classList.add('show'), 10);
    
    // Animación de salida y remoción
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300); // 300ms debe concordar con la transición CSS
    }, 3500);
};

// Descarga PWA Manual
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const insBtn = document.getElementById('btn-install');
    if (insBtn) {
        insBtn.style.display = 'block';
        insBtn.addEventListener('click', async () => {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                insBtn.style.display = 'none';
            }
            deferredPrompt = null;
        });
    }
});

})();
</script>
